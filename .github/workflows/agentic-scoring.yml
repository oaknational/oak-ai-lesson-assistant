name: Agentic scoring freshness

on:
  pull_request:
    branches: ["*"]

permissions:
  contents: read

jobs:
  check-freshness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check agentic scoring freshness
        run: ./packages/aila/src/lib/agentic-system/scoring/check-scoring-freshness.sh
